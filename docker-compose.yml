services:
  postgres:
    image: postgres:17-alpine
    container_name: lumera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumera}
      POSTGRES_DB: ${POSTGRES_DB:-lumera}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumera} -d ${POSTGRES_DB:-lumera}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lumera-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: 4000
      API_HOST: 0.0.0.0
      DATABASE_URL: postgres://lumera:lumera@postgres:5432/lumera
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-refresh-secret-change-me}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: pnpm --filter @lumera/api dev

volumes:
  postgres-data:
